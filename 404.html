<body oncontextmenu="return false;" ondragstart="return false;" onselectstart="return false;" oncopy="return false;">
<main>
  <p>Deze website blijft tot na de mondelinge behandeling van mijn zaak op zwart.</p>
</main>
<script>
(function(){'use strict';
var block=function(e){if(e&&e.preventDefault)e.preventDefault();return false;};
document.addEventListener('contextmenu',block,{capture:true});
document.addEventListener('keydown',function(e){var k=e.key||'',c=e.ctrlKey||e.metaKey,s=e.shiftKey;
if(k==='F12')return block(e);
if(c&&(k==='u'||k==='U'||k==='s'||k==='S'||k==='p'||k==='P'))return block(e);
if(c&&s&&(k==='I'||k==='i'||k==='J'||k==='j'||k==='C'||k==='c'||k==='K'||k==='k'))return block(e);
},{capture:true});
})();
</script>
